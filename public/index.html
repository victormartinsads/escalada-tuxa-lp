<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escalada da Liderança - Mentoria Tuxa Gonçalves</title>
  
  <!-- Fontes Premium do Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/index.css">
  <link rel="icon" href="/assets/logo-tuxa.webp" type="image/webp">
</head>
<body class="landing-page" data-version="{{version}}">

  <!-- Primeira Dobra (Hero Section) -->
  <section class="hero-section">
    <div class="hero-overlay"></div>
    <div class="container">
      
      <!-- Logo da Mentoria -->
      <div class="logo-container">
        <img src="/assets/logo-tuxa.webp" alt="Tuxa Gonçalves" class="logo">
      </div>
      
      <!-- Pill Badge Pulsante -->
      <div class="badge-container">
        <span class="cn-pill">
          <span class="cn-pill__dot"></span>
          <span class="cn-pill__text">{{pill}}</span>
        </span>
      </div>
      
      <!-- Headline & Subheadline Dinâmicas -->
      <div class="content-container">
        <h1 class="headline">{{headline}}</h1>
        <p class="subheadline">{{subheadline}}</p>
      </div>
      
      <!-- Botão CTA -->
      <div class="cta-container">
        <button id="cta-button" class="cta-btn" style="background: {{btnColor}}; color: {{btnTextColor}};">
          <span class="btn-text">{{btnText}}</span>
          <span class="btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 32 32" fill="none">
              <path d="M16 3C13.4288 3 10.9154 3.76244 8.77759 5.1909C6.63975 6.61935 4.97351 8.64968 3.98957 11.0251C3.00563 13.4006 2.74819 16.0144 3.2498 18.5362C3.75141 21.0579 4.98953 23.3743 6.80762 25.1924C8.6257 27.0105 10.9421 28.2486 13.4638 28.7502C15.9856 29.2518 18.5995 28.9944 20.9749 28.0104C23.3503 27.0265 25.3807 25.3603 26.8091 23.2224C28.2376 21.0846 29 18.5712 29 16C28.9964 12.5533 27.6256 9.24882 25.1884 6.81163C22.7512 4.37445 19.4467 3.00364 16 3ZM16 27C13.8244 27 11.6977 26.3549 9.88873 25.1462C8.07979 23.9375 6.66989 22.2195 5.83733 20.2095C5.00477 18.1995 4.78693 15.9878 5.21137 13.854C5.63581 11.7202 6.68345 9.7602 8.22183 8.22183C9.76021 6.68345 11.7202 5.6358 13.854 5.21136C15.9878 4.78692 18.1995 5.00476 20.2095 5.83733C22.2195 6.66989 23.9375 8.07979 25.1462 9.88873C26.3549 11.6977 27 13.8244 27 16C26.9967 18.9164 25.8367 21.7123 23.7745 23.7745C21.7123 25.8367 18.9164 26.9967 16 27ZM21.7075 15.2925C21.8005 15.3854 21.8742 15.4957 21.9246 15.6171C21.9749 15.7385 22.0008 15.8686 22.0008 16C22.0008 16.1314 21.9749 16.2615 21.9246 16.3829C21.8742 16.5043 21.8005 16.6146 21.7075 16.7075L17.7075 20.7075C17.5199 20.8951 17.2654 21.0006 17 21.0006C16.7346 21.0006 16.4801 20.8951 16.2925 20.7075C16.1049 20.5199 15.9994 20.2654 15.9994 20C15.9994 19.7346 16.1049 19.4801 16.2925 19.2925L18.5863 17H11C10.7348 17 10.4804 16.8946 10.2929 16.7071C10.1054 16.5196 10 16.2652 10 16C10 15.7348 10.1054 15.4804 10.2929 15.2929C10.4804 15.1054 10.7348 15 11 15H18.5863L16.2925 12.7075C16.1049 12.5199 15.9994 12.2654 15.9994 12C15.9994 11.7346 16.1049 11.4801 16.2925 11.2925C16.4801 11.1049 16.7346 10.9994 17 10.9994C17.2654 10.9994 17.5199 11.1049 17.7075 11.2925L21.7075 15.2925Z" fill="currentColor"></path>
            </svg>
          </span>
        </button>
      </div>

    </div>
  </section>

  <!-- Modal do Formulário de Captura Estilo Respondi / Multi-etapas -->
  <div id="lead-modal" class="modal-overlay">
    <div class="modal-card">
      <button id="modal-close" class="modal-close-btn" aria-label="Fechar">&times;</button>
      
      <!-- Barra de Progresso Superior -->
      <div class="modal-progress-container">
        <div class="progress-info">
          <span id="modal-step-indicator">Iniciando...</span>
          <span id="modal-percent-indicator">0% concluído</span>
        </div>
        <div class="modal-progress-bar-bg">
          <div id="modal-progress-bar-fill" class="modal-progress-bar-fill"></div>
        </div>
      </div>
      
      <!-- Formulário com Passos -->
      <form id="lead-form" class="modal-form">
        <!-- O JS preencherá as etapas aqui -->
        <div id="steps-container"></div>
        
        <!-- Controles de Navegação e Envio -->
        <div class="modal-footer-nav">
          <button type="button" id="prev-step-btn" class="modal-nav-btn prev-btn">
            &larr; Voltar
          </button>
          
          <button type="button" id="next-step-btn" class="modal-nav-btn next-btn">
            Avançar &rarr;
          </button>
          
          <button type="submit" id="submit-btn" class="submit-btn" style="display: none;">
            <span class="submit-btn-text">FINALIZAR E REDIRECIONAR</span>
            <span class="submit-btn-spinner"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="/index.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sessão Estratégica Gratuita | Tuxa Gonçalves</title>
  <meta name="description" content="Tuxa Gonçalves está selecionando 15 empresários da gastronomia para uma Sessão Estratégica individual e gratuita." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <!-- ══ HERO ══════════════════════════════════════════════════════════════ -->
  <section class="hero" id="hero">
    <div class="hero__overlay"></div>
    <div class="hero__container">

      <!-- Pill badge -->
      <div class="hero__pill" id="hero-pill">
        <span class="pill__dot"></span>
        <span class="pill__text" id="pill-text">Referência em CURITIBA - PR</span>
      </div>

      <!-- Headline -->
      <h1 class="hero__headline" id="hero-headline">
        Carregando…
      </h1>

      <!-- Subheadline -->
      <p class="hero__subheadline" id="hero-subheadline">
        Carregando…
      </p>

      <!-- CTA -->
      <button class="hero__cta" id="hero-cta">
        Quero aplicar para a Sessão Estratégica Gratuita com a Tuxa
      </button>

      <!-- Subtext under button -->
      <div class="hero__btn-subtext" id="hero-btn-subtext">
        <span>✔ Sessão individual</span>
        <span>✔ Aproximadamente 30 minutos</span>
        <span>✔ 100% online e gratuito</span>
        <span>✔ Aplicação sujeita à aprovação</span>
      </div>

    </div>
  </section>

  <!-- ══ MODAL FORM ═════════════════════════════════════════════════════════ -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-label="Formulário de aplicação">
    <div class="modal" id="modal">
      <!-- Progress bar -->
      <div class="modal__progress">
        <div class="modal__progress-bar" id="modal-progress-bar"></div>
      </div>

      <!-- Steps will be dynamically injected here by index.js -->
      <div class="modal__steps" id="modal-steps"></div>

      <!-- Footer nav -->
      <div class="modal__footer" id="modal-footer">
        <button class="modal__btn modal__btn--back" id="btn-back">← Voltar</button>
        <button class="modal__btn modal__btn--next" id="btn-next">Continuar →</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
